<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo List</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<nav>
		<h1>Todo List</h1>
	</nav>
	<main>
		<section id="add-todo">
			<h2>Add a New Todo</h2>
			<div class="add">
				<input id="todo-input" type="text" placeholder="Enter new todo" required>
				<button id="submit-btn" type="submit">Add Todo</button>
			</div>
		</section>
		<section id="todo-display">
			<h2>Your Todos</h2>
			<ul id="todo-list">
				<!-- Todos will be dynamically added here -->
			</ul>
		</section>
	</main>
	<script src="index.js"></script>
</body>
</html>
